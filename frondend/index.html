<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pair Programming</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07090f;
      --accent-g: #00f5a0;
      --accent-p: #7b61ff;
      --text: #e2e4f0;
      --dim: #52556a;
      --border: #181c2a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* grid lines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ambient orbs */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: 0.13;
      pointer-events: none;
      animation: drift 9s ease-in-out infinite alternate;
    }
    .orb-g { width: 420px; height: 420px; background: var(--accent-g); top: -120px; left: -120px; }
    .orb-p { width: 360px; height: 360px; background: var(--accent-p); bottom: -100px; right: -100px; animation-delay: -4.5s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(28px, 18px); } }

    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 3.5rem;
      padding: 2rem;
    }

    /* header */
    .header { text-align: center; animation: fadeDown .65s ease both; }

    .eyebrow {
      display: inline-flex; align-items: center; gap: .45rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--dim);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 100px; padding: .28rem .9rem;
      margin-bottom: 1.1rem;
    }
    .eyebrow-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-g);
      box-shadow: 0 0 6px var(--accent-g);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800; line-height: 1.02;
      letter-spacing: -.025em;
    }
    .g { color: var(--accent-g); }
    .p { color: var(--accent-p); }

    .sub {
      margin-top: .75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem; color: var(--dim);
    }

    /* buttons */
    .btns {
      display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center;
      animation: fadeUp .65s .18s ease both;
    }

    .btn {
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: flex-start;
      gap: .6rem;
      width: 220px;
      padding: 1.8rem 1.6rem;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #0d1018;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0; opacity: 0;
      transition: opacity .3s;
    }
    .btn:hover { transform: translateY(-5px); }
    .btn:hover::after { opacity: 1; }

    .btn-g::after { background: radial-gradient(circle at 50% 0%, rgba(0,245,160,.09) 0%, transparent 70%); }
    .btn-g:hover { border-color: var(--accent-g); box-shadow: 0 0 36px rgba(0,245,160,.16); }

    .btn-p { opacity: .45; pointer-events: none; }
    .btn-p::after { background: radial-gradient(circle at 50% 0%, rgba(123,97,255,.09) 0%, transparent 70%); }

    .btn-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.1rem;
    }
    .btn-g .btn-icon { background: rgba(0,245,160,.1); color: var(--accent-g); border: 1px solid rgba(0,245,160,.2); }
    .btn-p .btn-icon { background: rgba(123,97,255,.1); color: var(--accent-p); border: 1px solid rgba(123,97,255,.2); }

    .btn-label {
      font-size: 1.15rem; font-weight: 800;
    }
    .btn-g .btn-label { color: var(--accent-g); }
    .btn-p .btn-label { color: var(--accent-p); }

    .btn-desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; color: var(--dim); line-height: 1.55;
    }

    .chip-soon {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem; text-transform: uppercase; letter-spacing: .07em;
      background: rgba(123,97,255,.12); color: var(--accent-p);
      border: 1px solid rgba(123,97,255,.25);
      border-radius: 100px; padding: .18rem .55rem;
    }

    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem; color: var(--dim);
      animation: fadeUp .65s .32s ease both;
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="orb orb-g"></div>
  <div class="orb orb-p"></div>

  <div class="wrap">
    <div class="header">
      <div class="eyebrow"><span class="eyebrow-dot"></span>TDD · Fase Refactorización</div>
      <h1><span class="g">Pair</span> <span class="p">Programming</span></h1>
      <p class="sub">// Selecciona una historia de usuario</p>
    </div>

    <div class="btns">
      <a href="jhael.html" class="btn btn-g">
        <div class="btn-icon">J</div>
        <div class="btn-label">Jhael</div>
        <p class="btn-desc">Sesión de revisión colaborativa en tiempo real</p>
      </a>
      <a href="indexvis.html" class="btn btn-g">
        <div class="btn-icon">D</div>
        <div class="btn-label">Dylan</div>
        <p class="btn-desc">Sesión de revisión colaborativa en tiempo real</p>
      </a>
    </div>

  

    <p class="footer">Python · Flask · MySQL &nbsp;|&nbsp; Ingeniería de Software 2025</p>
  </div>
</body>
</html>
